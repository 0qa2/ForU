<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flowing Heart Text</title>
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

    <div class="heart-container">
        <svg viewBox="0 0 600 600">
            <defs>
                <path id="heart-path" d="M 300,240 
                         C 300,140 180,120 180,220 
                         C 180,320 300,400 300,460 
                         C 300,400 420,320 420,220 
                         C 420,120 300,140 300,240 Z" />
            </defs>
            
            <text class="heart-text">
                <textPath href="#heart-path" startOffset="0%">
                    i love you i love you i love you i love you i love you i love you i love you i love you i love you i love you i love you i love you
                </textPath>
            </text>
        </svg>
    </div>

</body>
</html>
