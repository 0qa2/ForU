<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Text Heart</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui"></div>

    <script>
        const ui = document.getElementById('ui');
        const totalLayers = 30; // More layers make it look smoother!

        for (let i = 0; i < totalLayers; i++) {
            const angle = (i / totalLayers) * Math.PI * 2;
            
            // Mathematical heart shape formula (Parametric Heart Equation)
            const x = 16 * Math.pow(Math.sin(angle), 3);
            const y = 13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle);
            
            // Scale the math up so it's big enough to see
            const xPos = x * 12;
            const yPos = -y * 12; // Flip Y so the heart is right side up

            // Create the layer
            const layer = document.createElement('div');
            layer.className = 'love_horizontal';
            
            // Position each layer exactly along the heart path
            layer.style.transform = `translateX(${xPos}px) translateY(${yPos}px) translateZ(${i * 2 - 30}px)`;
            
            layer.innerHTML = '<span class="love_word">i love you</span>';
            ui.appendChild(layer);
        }
    </script>
</body>
</html>
